application:
  name: MyApp
  version: 2.5.1
  environment: production
database:
  host: localhost
  port: 5432
  name: mydb
  credentials:
    username: admin
    password: secret
  pool:
    min: 5
    max: 20
    timeout: 30000
server:
  host: 0.0.0.0
  port: 8080
  ssl:
    enabled: true
    cert: /path/to/cert.pem
    key: /path/to/key.pem
  cors:
    origins:
      - https://example.com
      - https://api.example.com
    methods:
      - GET
      - POST
      - PUT
      - DELETE
logging:
  level: INFO
  format: json
  outputs:
    - type: console
      colored: true
    - type: file
      path: /var/log/app.log
      rotate: daily
